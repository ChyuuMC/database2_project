version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: order_processing_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: dbpassword
      MARIADB_DATABASE: OrderProcessingDB
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    container_name: order_processing_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=dbpassword
      - DB_NAME=OrderProcessingDB
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
