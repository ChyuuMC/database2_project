version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: order_processing_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dbpassword
      POSTGRES_DB: OrderProcessingDB
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d OrderProcessingDB"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    container_name: order_processing_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=root
      - DB_PASSWORD=dbpassword
      - DB_NAME=OrderProcessingDB
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
